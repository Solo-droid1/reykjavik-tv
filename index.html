<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reykjavik.tv — Live from Iceland</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --black:#0a0c10;--panel:#131820;--border:#1e2730;
    --aurora1:#00ffc8;--aurora2:#00b4ff;
    --text:#e8edf2;--muted:#6b7a8d;--danger:#ff4444;--warn:#ffaa00;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden;}
  .aurora-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
  .aurora-bg::before{
    content:'';position:absolute;width:200%;height:200%;top:-50%;left:-50%;
    background:radial-gradient(ellipse 80% 40% at 20% 30%,rgba(0,255,200,.07) 0%,transparent 60%),
               radial-gradient(ellipse 60% 50% at 80% 20%,rgba(0,180,255,.06) 0%,transparent 60%),
               radial-gradient(ellipse 70% 40% at 50% 80%,rgba(138,43,226,.05) 0%,transparent 60%);
    animation:adrift 18s ease-in-out infinite alternate;
  }
  @keyframes adrift{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(-3%,2%) rotate(3deg)}}
  .wrapper{position:relative;z-index:2;max-width:1280px;margin:0 auto;padding:0 24px;}

  header{display:flex;align-items:center;justify-content:space-between;padding:24px 0 20px;border-bottom:1px solid var(--border);}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-.02em;display:flex;align-items:center;gap:8px;}
  .logo .tv{background:linear-gradient(135deg,var(--aurora1),var(--aurora2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--aurora1);box-shadow:0 0 12px var(--aurora1);animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  .header-meta{display:flex;align-items:center;gap:20px;font-size:.7rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
  .live{display:flex;align-items:center;gap:6px;color:var(--danger);font-weight:700;}
  .live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--danger);box-shadow:0 0 8px var(--danger);animation:pulse 1.2s ease-in-out infinite;}

  .alert-bar{margin:24px 0 0;border:1px solid rgba(0,255,200,.3);border-radius:8px;background:rgba(0,255,200,.04);padding:20px 28px;display:flex;align-items:center;gap:32px;position:relative;overflow:hidden;}
  .alert-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--aurora1),transparent);animation:scan 3s linear infinite;}
  @keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

  .kp-ring{position:relative;width:80px;height:80px;flex-shrink:0;}
  .kp-ring svg{width:100%;height:100%;transform:rotate(-90deg);}
  .kp-ring .track{fill:none;stroke:var(--border);stroke-width:5;}
  .kp-ring .fill{fill:none;stroke:var(--aurora1);stroke-width:5;stroke-linecap:round;stroke-dasharray:201;stroke-dashoffset:201;filter:drop-shadow(0 0 4px var(--aurora1));transition:stroke-dashoffset 1.2s ease,stroke .5s;}
  .kp-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;line-height:1;color:var(--aurora1);}
  .kp-label small{font-size:.5rem;color:var(--muted);font-family:'Space Mono',monospace;font-weight:400;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

  .alert-info h2{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--aurora1);margin-bottom:4px;}
  .alert-info p{font-size:.75rem;color:var(--muted);line-height:1.6;max-width:420px;}
  .meters{display:flex;gap:4px;margin-top:10px;}
  .mb{height:6px;flex:1;border-radius:3px;background:var(--border);transition:background .5s;}
  .mb.a{background:var(--aurora1);box-shadow:0 0 6px var(--aurora1);}
  .mb.w{background:var(--warn);box-shadow:0 0 6px var(--warn);}
  .mb.d{background:var(--danger);box-shadow:0 0 6px var(--danger);}

  .alert-status{margin-left:auto;text-align:right;flex-shrink:0;}
  .badge{display:inline-block;padding:6px 14px;border-radius:4px;font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:rgba(0,255,200,.12);color:var(--aurora1);border:1px solid rgba(0,255,200,.3);margin-bottom:8px;}
  .badge.w{background:rgba(255,170,0,.12);color:var(--warn);border-color:rgba(255,170,0,.3);}
  .badge.d{background:rgba(255,68,68,.12);color:var(--danger);border-color:rgba(255,68,68,.3);}
  .alert-status small{display:block;font-size:.65rem;color:var(--muted);}

  .main-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:20px;}
  .cam-col{display:flex;flex-direction:column;gap:16px;}
  .cam-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--panel);}
  .cam-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);}
  .cam-name{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;}
  .cam-name strong{color:var(--text);font-size:.78rem;}
  .cam-embed{width:100%;aspect-ratio:16/9;background:#050810;}
  .cam-embed iframe{width:100%;height:100%;border:none;display:block;}
  .cam-bar{background:rgba(10,12,16,.7);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);}
  .cam-bar .loc{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;}
  .cam-bar .ts{font-size:.65rem;color:var(--muted);}

  .thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .thumb{border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;background:var(--panel);transition:border-color .2s;}
  .thumb:hover{border-color:var(--aurora2);}
  .thumb.on{border-color:var(--aurora1);}
  .timg{width:100%;aspect-ratio:16/9;background:#080c14;display:flex;align-items:center;justify-content:center;font-size:1.5rem;}
  .tlbl{padding:6px 8px;font-size:.6rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .sidebar{display:flex;flex-direction:column;gap:16px;}
  .widget{border:1px solid var(--border);border-radius:8px;background:var(--panel);overflow:hidden;}
  .whead{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;justify-content:space-between;}
  .whead span{color:var(--aurora2);}
  .loading{padding:20px;text-align:center;font-size:.7rem;color:var(--muted);animation
